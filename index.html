<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>注音 · Treino de Zhuyin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Manrope:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:        #0d0d12;
    --bg2:       #13131c;
    --bg3:       #1a1a27;
    --border:    rgba(180,160,255,0.10);
    --accent:    #c4b0ff;
    --accent2:   #a78bfa;
    --accent-dim:#6d5b99;
    --text:      #e8e3f5;
    --muted:     #7a738f;
    --card-bg:   #141420;

    --good: #7fe3ac;
    --bad:  #f28b8b;

    --ease: cubic-bezier(.2,.7,.3,1);
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; padding:0; height:100%; background:var(--bg); color:var(--text); font-family:'Inter',system-ui,sans-serif; }

  body{
    min-height:100dvh; overflow-x:hidden; position:relative;
    display:flex; flex-direction:column; align-items:center;
  }

  /* ---------- ambient background ---------- */
  .veil{ position:fixed; inset:0; z-index:0; pointer-events:none; background:var(--bg); overflow:hidden; }
  .veil .blob{
    position:absolute; border-radius:50%; filter:blur(70px); opacity:.55;
    animation:float 22s ease-in-out infinite;
  }
  .veil .b1{ width:420px; height:420px; left:-120px; top:-140px; background:radial-gradient(circle, rgba(167,139,250,.30), transparent 70%); }
  .veil .b2{ width:460px; height:460px; right:-160px; bottom:-160px; background:radial-gradient(circle, rgba(196,176,255,.22), transparent 70%); animation-delay:-9s; animation-duration:26s; }
  .veil .b3{ width:300px; height:300px; right:10%; top:15%; background:radial-gradient(circle, rgba(109,91,153,.28), transparent 70%); animation-delay:-4s; animation-duration:19s; }
  @keyframes float{
    0%,100%{ transform:translate(0,0) scale(1); }
    50%{ transform:translate(24px,-18px) scale(1.08); }
  }
  .veil::after{
    content:""; position:absolute; inset:0;
    background-image:linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size:56px 56px;
    mask-image:radial-gradient(circle at 50% 20%, black, transparent 70%);
    opacity:.4;
  }

  .stage{ position:relative; z-index:1; width:100%; max-width:520px; padding:26px 20px 22px; display:flex; flex-direction:column; min-height:100dvh; }

  /* ---------- header ---------- */
  header.app-head{ display:flex; align-items:center; gap:12px; margin-bottom:24px; }
  .brand-mark{
    width:42px; height:42px; border-radius:13px; flex-shrink:0;
    background:linear-gradient(150deg, rgba(167,139,250,.22), rgba(167,139,250,.04));
    border:1px solid var(--border);
    display:flex; align-items:center; justify-content:center;
    font-family:'Noto Serif TC',serif; font-size:19px; color:var(--accent);
  }
  header h1{ font-family:'Manrope',sans-serif; font-weight:800; font-size:15.5px; margin:0; letter-spacing:.01em; }
  header small{ display:block; font-size:11px; color:var(--muted); margin-top:1px; font-weight:500; }

  /* ---------- shared panel ---------- */
  .panel{ background:var(--card-bg); border:1px solid var(--border); border-radius:20px; }

  /* ================= SETUP ================= */
  #setup{ display:flex; flex-direction:column; gap:20px; flex:1; }
  .setup-intro h2{ font-family:'Manrope',sans-serif; font-size:21px; font-weight:800; margin:0 0 6px; }
  .setup-intro p{ margin:0; font-size:13px; color:var(--muted); line-height:1.55; }

  .row-between{ display:flex; align-items:center; justify-content:space-between; }
  .chip-all{
    border:1px solid var(--border); background:var(--bg3); color:var(--accent2);
    font-family:'Inter',sans-serif; font-weight:600; font-size:12px;
    padding:8px 14px; border-radius:999px; cursor:pointer; transition:border-color .15s var(--ease), color .15s var(--ease);
  }
  .chip-all:hover{ border-color:var(--accent-dim); }
  .chip-all.active{ background:linear-gradient(120deg, var(--accent), var(--accent2)); color:#0d0d12; border-color:transparent; }

  .cat-grid{ display:flex; flex-direction:column; gap:12px; }

  .cat-card{
    padding:15px; display:flex; align-items:center; gap:14px; cursor:pointer; user-select:none;
    transition:border-color .18s var(--ease), background .18s var(--ease), transform .12s var(--ease);
  }
  .cat-card:active{ transform:scale(.985); }
  .cat-card .badge{
    width:56px; height:56px; border-radius:16px; flex-shrink:0;
    background:var(--bg3); border:1px solid var(--border);
    display:flex; align-items:center; justify-content:center;
    font-family:'Noto Serif TC',serif; font-size:16px; color:var(--accent-dim);
    letter-spacing:1px; line-height:1.15; text-align:center; padding:2px;
    transition:color .18s var(--ease), border-color .18s var(--ease);
  }
  .cat-card .info{ flex:1; min-width:0; }
  .cat-card .info .name{ font-family:'Manrope',sans-serif; font-weight:700; font-size:14.5px; }
  .cat-card .info .count{ font-size:11.5px; color:var(--muted); margin-top:2px; }
  .cat-card .check{
    width:22px; height:22px; border-radius:7px; border:1.5px solid var(--accent-dim);
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
    transition:background .15s var(--ease), border-color .15s var(--ease);
  }
  .cat-card .check svg{ width:12px; height:12px; opacity:0; transition:opacity .12s var(--ease); }
  .cat-card.active{ border-color:var(--accent-dim); background:linear-gradient(180deg, rgba(167,139,250,.08), rgba(167,139,250,.02)); }
  .cat-card.active .badge{ color:var(--accent); border-color:var(--accent-dim); }
  .cat-card.active .check{ background:var(--accent2); border-color:var(--accent2); }
  .cat-card.active .check svg{ opacity:1; }

  .start-btn{
    margin-top:auto; border:none; border-radius:16px; padding:16px; font-family:'Manrope',sans-serif;
    font-weight:800; font-size:15px; letter-spacing:.02em; color:#0d0d12;
    background:linear-gradient(135deg, var(--accent), var(--accent2));
    cursor:pointer; transition:opacity .15s var(--ease), transform .1s var(--ease);
  }
  .start-btn:disabled{ opacity:.3; cursor:not-allowed; }
  .start-btn:not(:disabled):active{ transform:scale(.985); }

  /* ================= QUIZ ================= */
  #quiz{ display:none; flex-direction:column; flex:1; gap:16px; }
  #quiz.show{ display:flex; }
  #setup.hide{ display:none; }

  .quiz-top{ display:flex; align-items:center; justify-content:space-between; }
  .back-btn{
    background:none; border:none; color:var(--muted); font-size:12.5px; font-family:'Inter',sans-serif;
    display:flex; align-items:center; gap:5px; cursor:pointer; padding:6px 0;
  }
  .back-btn:hover{ color:var(--text); }

  .badges{ display:flex; gap:8px; }
  .badge-pill{
    display:flex; align-items:center; gap:5px; padding:6px 11px; border-radius:999px;
    background:var(--bg3); border:1px solid var(--border); font-family:'Manrope',sans-serif;
  }
  .badge-pill .dot{ width:6px; height:6px; border-radius:50%; }
  .badge-pill.good .dot{ background:var(--good); }
  .badge-pill.bad .dot{ background:var(--bad); }
  .badge-pill.streak .dot{ background:var(--accent); }
  .badge-pill .n{ font-size:13px; font-weight:800; }

  .card-wrap{ flex:1; display:flex; align-items:center; justify-content:center; padding:6px 0; }

  /* the "tian zi ge" practice-sheet card: signature element */
  .glyph-card{
    position:relative; display:inline-flex; align-items:center; justify-content:center;
    min-width:220px; min-height:220px; padding:10px;
    border-radius:30px; border:1px solid var(--border);
    background:radial-gradient(120% 120% at 50% 0%, rgba(167,139,250,.08), transparent 60%), var(--card-bg);
    transition:border-color .2s var(--ease), box-shadow .3s var(--ease);
  }
  .glyph-card::before, .glyph-card::after{
    content:""; position:absolute; pointer-events:none;
    background:var(--border);
  }
  .glyph-card::before{ left:50%; top:9%; bottom:9%; width:1px; transform:translateX(-.5px); }
  .glyph-card::after{ top:50%; left:9%; right:9%; height:1px; transform:translateY(-.5px); }
  .glyph-card .corner-frame{
    position:absolute; inset:9%; border:1px solid var(--border); border-radius:14px; pointer-events:none;
  }
  .glyph-card.pulse{ animation:pulse 2.8s ease-in-out infinite; }
  @keyframes pulse{ 0%,100%{ box-shadow:0 0 0 0 rgba(167,139,250,0); } 50%{ box-shadow:0 0 34px 2px rgba(167,139,250,.10); } }
  .glyph-card.correct{ border-color:var(--good); box-shadow:0 0 36px 4px rgba(127,227,172,.20); animation:none; }
  .glyph-card.wrong{ border-color:var(--bad); box-shadow:0 0 36px 4px rgba(242,139,139,.18); animation:shake .3s var(--ease); }
  @keyframes shake{ 20%{ transform:translateX(-6px); } 40%{ transform:translateX(5px); } 60%{ transform:translateX(-4px); } 80%{ transform:translateX(3px); } 100%{ transform:translateX(0); } }

  .glyph{
    position:relative; font-family:'Noto Serif TC',serif; color:var(--text); line-height:1;
    user-select:none; letter-spacing:1px;
    font-size:clamp(70px, 24vw, 112px);
    opacity:0; transform:translateY(6px) scale(.94);
    transition:opacity .2s var(--ease), transform .2s var(--ease);
  }
  .glyph.combo{ font-size:clamp(46px, 16vw, 72px); letter-spacing:2px; }
  .glyph.in{ opacity:1; transform:translateY(0) scale(1); }

  .status-icon{
    position:absolute; top:-11px; right:-11px; width:34px; height:34px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    opacity:0; transform:scale(.5); transition:opacity .16s var(--ease), transform .16s var(--ease);
  }
  .status-icon svg{ width:17px; height:17px; }
  .status-icon.good{ background:var(--good); }
  .status-icon.bad{ background:var(--bad); }
  .status-icon.show{ opacity:1; transform:scale(1); }

  .answer-zone{ display:flex; flex-direction:column; gap:9px; }
  .answer-row{
    display:flex; align-items:center; gap:6px; background:var(--bg3);
    border:1.5px solid var(--border); border-radius:999px; padding:6px 6px 6px 20px;
    transition:border-color .15s var(--ease);
  }
  .answer-row.correct{ border-color:var(--good); }
  .answer-row.wrong{ border-color:var(--bad); }

  #answer{
    flex:1; background:none; border:none; outline:none; padding:9px 0;
    font-size:16.5px; font-family:'Manrope',sans-serif; font-weight:700; color:var(--text); letter-spacing:.02em;
  }
  #answer::placeholder{ color:var(--muted); font-weight:500; }
  .answer-row.correct #answer{ color:var(--good); }
  .answer-row.wrong #answer{ color:var(--bad); }

  #submit{
    border:none; border-radius:999px; padding:12px 20px; font-family:'Manrope',sans-serif;
    font-weight:800; font-size:13.5px; color:#0d0d12;
    background:linear-gradient(135deg, var(--accent), var(--accent2));
    cursor:pointer; white-space:nowrap; transition:transform .1s var(--ease);
  }
  #submit:active{ transform:scale(.94); }

  .feedback{ min-height:18px; padding:0 6px; font-size:12.5px; color:var(--muted); display:flex; align-items:center; gap:5px; }
  .feedback.correct{ color:var(--good); }
  .feedback.wrong{ color:var(--bad); }
  .feedback b{ font-family:'Manrope',sans-serif; letter-spacing:.02em; }

  .util-row{ display:flex; justify-content:space-between; align-items:center; padding:0 4px; }
  .skip-btn, .end-btn{ background:none; border:none; color:var(--muted); font-size:12px; font-family:'Inter',sans-serif; cursor:pointer; padding:6px 2px; transition:color .15s var(--ease); }
  .skip-btn:hover, .end-btn:hover{ color:var(--text); }

  /* ================= RESULT ================= */
  #result{ display:none; position:fixed; inset:0; z-index:5; background:rgba(8,8,12,.72); backdrop-filter:blur(6px); align-items:center; justify-content:center; padding:24px; }
  #result.show{ display:flex; }
  .result-card{ width:100%; max-width:360px; padding:26px 22px 22px; text-align:center; }
  .result-card .glyph-mini{ font-family:'Noto Serif TC',serif; font-size:30px; color:var(--accent); margin-bottom:8px; }
  .result-card h3{ font-family:'Manrope',sans-serif; font-size:17px; margin:0 0 3px; }
  .result-card p.sub{ font-size:12px; color:var(--muted); margin:0 0 20px; }
  .result-stats{ display:flex; justify-content:space-around; margin-bottom:22px; }
  .result-stats .stat .n{ font-size:19px; font-family:'Manrope',sans-serif; font-weight:800; }
  .result-stats .stat .l{ font-size:9.5px; color:var(--muted); letter-spacing:.06em; text-transform:uppercase; margin-top:2px; }
  .result-stats .stat.good .n{ color:var(--good); }
  .result-stats .stat.bad .n{ color:var(--bad); }
  .again-btn{ width:100%; border:none; border-radius:14px; padding:14px; font-family:'Manrope',sans-serif; font-weight:800; font-size:14px; color:#0d0d12; background:linear-gradient(135deg, var(--accent), var(--accent2)); cursor:pointer; }

  ::selection{ background:rgba(167,139,250,.3); }
  :focus-visible{ outline:2px solid var(--accent2); outline-offset:2px; }

  @media (min-width:640px){
    .stage{ padding-top:40px; }
    .cat-grid{ flex-direction:row; }
    .cat-card{ flex:1; flex-direction:column; text-align:center; gap:10px; padding:20px 14px; }
    .cat-card .badge{ width:100%; height:64px; font-size:17px; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important; }
    .veil .blob{ display:none; }
  }
</style>
</head>
<body>
<div class="veil"><div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div></div>

<div class="stage">

  <header class="app-head">
    <div class="brand-mark">注</div>
    <div>
      <h1>Treino de Zhuyin</h1>
      <small>bopomofo · leitura romanizada</small>
    </div>
  </header>

  <!-- SETUP -->
  <section id="setup">
    <div class="setup-intro">
      <h2>O que você quer estudar?</h2>
      <p>Escolha uma ou mais categorias. O símbolo aparece e você digita a leitura — ex: para ㄅ digite "b".</p>
    </div>

    <div class="row-between">
      <span style="font-size:11.5px; color:var(--muted); font-weight:600;">CATEGORIAS</span>
      <button class="chip-all" id="allToggle" type="button">Selecionar tudo</button>
    </div>

    <div class="cat-grid" id="catGrid"></div>

    <button class="start-btn" id="startBtn" disabled type="button">Começar treino</button>
  </section>

  <!-- QUIZ -->
  <section id="quiz">
    <div class="quiz-top">
      <button class="back-btn" id="backBtn" type="button">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
        categorias
      </button>
      <div class="badges">
        <div class="badge-pill good"><span class="dot"></span><span class="n" id="statCorrect">0</span></div>
        <div class="badge-pill bad"><span class="dot"></span><span class="n" id="statWrong">0</span></div>
        <div class="badge-pill streak"><span class="dot"></span><span class="n" id="statStreak">0</span></div>
      </div>
    </div>

    <div class="card-wrap">
      <div class="glyph-card pulse" id="glyphCard">
        <div class="corner-frame"></div>
        <div class="glyph" id="glyphText"></div>
        <div class="status-icon good" id="iconGood">
          <svg viewBox="0 0 24 24" fill="none" stroke="#0d0d12" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div class="status-icon bad" id="iconBad">
          <svg viewBox="0 0 24 24" fill="none" stroke="#0d0d12" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </div>
      </div>
    </div>

    <div class="answer-zone">
      <div class="answer-row" id="answerRow">
        <input id="answer" type="text" placeholder="digite a leitura…" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" inputmode="text">
        <button id="submit" type="button">Verificar</button>
      </div>
      <div class="feedback" id="feedback"></div>
      <div class="util-row">
        <button class="skip-btn" id="skipBtn" type="button">pular →</button>
        <button class="end-btn" id="endBtn" type="button">encerrar sessão</button>
      </div>
    </div>
  </section>

</div>

<!-- RESULT MODAL -->
<div id="result">
  <div class="panel result-card">
    <div class="glyph-mini">注音</div>
    <h3>Sessão encerrada</h3>
    <p class="sub">veja como você foi</p>
    <div class="result-stats">
      <div class="stat good"><div class="n" id="rCorrect">0</div><div class="l">acertos</div></div>
      <div class="stat bad"><div class="n" id="rWrong">0</div><div class="l">erros</div></div>
      <div class="stat"><div class="n" id="rAcc">0%</div><div class="l">precisão</div></div>
    </div>
    <button class="again-btn" id="againBtn" type="button">Escolher categorias</button>
  </div>
</div>

<script>
(function(){
  "use strict";

  /* ---------------- DATA ---------------- */
  const CONSONANTS = [
    ["ㄅ",["b"]], ["ㄆ",["p"]], ["ㄇ",["m"]], ["ㄈ",["f"]],
    ["ㄉ",["d"]], ["ㄊ",["t"]], ["ㄋ",["n"]], ["ㄌ",["l"]],
    ["ㄍ",["g"]], ["ㄎ",["k"]], ["ㄏ",["h"]],
    ["ㄐ",["j"]], ["ㄑ",["q"]], ["ㄒ",["x"]],
    ["ㄓ",["zh","jh"]], ["ㄔ",["ch"]], ["ㄕ",["sh"]], ["ㄖ",["r"]],
    ["ㄗ",["z"]], ["ㄘ",["c"]], ["ㄙ",["s"]]
  ];

  const VOWELS = [
    ["ㄧ",["i","yi"]],
    ["ㄨ",["u","wu"]],
    ["ㄩ",["yu","v","ü"]],
    ["ㄚ",["a"]],
    ["ㄛ",["o"]],
    ["ㄜ",["e"]],
    ["ㄝ",["ê","e"]],
    ["ㄞ",["ai"]],
    ["ㄟ",["ei"]],
    ["ㄠ",["ao"]],
    ["ㄡ",["ou"]],
    ["ㄢ",["an"]],
    ["ㄣ",["en"]],
    ["ㄤ",["ang"]],
    ["ㄥ",["eng"]],
    ["ㄦ",["er","erh"]]
  ];

  const COMBOS = [
    ["ㄧㄚ",["ia","ya"]],
    ["ㄧㄛ",["io","yo"]],
    ["ㄧㄝ",["ie","ye"]],
    ["ㄧㄠ",["iao","yao"]],
    ["ㄧㄡ",["iu","you","iou"]],
    ["ㄧㄢ",["ian","yan"]],
    ["ㄧㄣ",["in","yin"]],
    ["ㄧㄤ",["iang","yang"]],
    ["ㄧㄥ",["ing","ying"]],
    ["ㄨㄚ",["ua","wa"]],
    ["ㄨㄛ",["uo","wo"]],
    ["ㄨㄞ",["uai","wai"]],
    ["ㄨㄟ",["ui","wei","uei"]],
    ["ㄨㄢ",["uan","wan"]],
    ["ㄨㄣ",["un","wen","uen"]],
    ["ㄨㄤ",["uang","wang"]],
    ["ㄨㄥ",["ong","weng"]],
    ["ㄩㄝ",["ue","yue","üe"]],
    ["ㄩㄢ",["uan","yuan","üan"]],
    ["ㄩㄣ",["un","yun","ün"]],
    ["ㄩㄥ",["iong","yong"]]
  ];

  const CATEGORIES = [
    { key:"consonants", name:"Consoantes", sub:"聲母 · 21 símbolos", sample:"ㄅㄆㄇㄈ", data:CONSONANTS },
    { key:"vowels",     name:"Vogais simples", sub:"韻母 · 16 símbolos", sample:"ㄚㄛㄜㄧ", data:VOWELS },
    { key:"combos",     name:"Combos de vogais", sub:"結合韻母 · 20 símbolos", sample:"ㄧㄥㄨㄛ", data:COMBOS }
  ];

  /* ---------------- STATE ---------------- */
  const selected = new Set();
  let pool = [], queue = [], current = null, answered = false, qToken = 0;
  let correctCount = 0, wrongCount = 0, streak = 0;
  let pendingTimer = null;

  /* ---------------- HELPERS ---------------- */
  function normalize(s){
    return s.normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase().replace(/[^a-z0-9]/g,"");
  }
  function shuffle(arr){
    const a = arr.slice();
    for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
    return a;
  }

  /* ---------------- SETUP UI ---------------- */
  const catGrid = document.getElementById("catGrid");
  CATEGORIES.forEach(cat=>{
    const card = document.createElement("div");
    card.className = "cat-card panel";
    card.dataset.key = cat.key;
    card.innerHTML =
      '<div class="badge">'+cat.sample+'</div>'+
      '<div class="info"><div class="name">'+cat.name+'</div><div class="count">'+cat.sub+'</div></div>'+
      '<div class="check"><svg viewBox="0 0 24 24" fill="none" stroke="#0d0d12" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>';
    card.addEventListener("click", ()=>{
      if(selected.has(cat.key)){ selected.delete(cat.key); card.classList.remove("active"); }
      else { selected.add(cat.key); card.classList.add("active"); }
      syncAllToggle();
      updateStartBtn();
    });
    catGrid.appendChild(card);
  });

  function syncAllToggle(){
    document.getElementById("allToggle").classList.toggle("active", selected.size === CATEGORIES.length);
  }
  function updateStartBtn(){ document.getElementById("startBtn").disabled = selected.size === 0; }

  document.getElementById("allToggle").addEventListener("click", ()=>{
    const allSelected = selected.size === CATEGORIES.length;
    document.querySelectorAll(".cat-card").forEach(card=>{
      if(allSelected){ selected.delete(card.dataset.key); card.classList.remove("active"); }
      else { selected.add(card.dataset.key); card.classList.add("active"); }
    });
    syncAllToggle();
    updateStartBtn();
  });

  /* ---------------- SCREEN SWITCHING ---------------- */
  const setupEl = document.getElementById("setup");
  const quizEl = document.getElementById("quiz");
  const resultEl = document.getElementById("result");

  document.getElementById("startBtn").addEventListener("click", startSession);
  document.getElementById("backBtn").addEventListener("click", ()=>endSession(false));
  document.getElementById("endBtn").addEventListener("click", ()=>endSession(true));
  document.getElementById("againBtn").addEventListener("click", ()=>resultEl.classList.remove("show"));

  function startSession(){
    pool = [];
    CATEGORIES.forEach(cat=>{ if(selected.has(cat.key)) pool = pool.concat(cat.data); });
    queue = shuffle(pool);
    correctCount = 0; wrongCount = 0; streak = 0;
    updateStatBar();
    setupEl.classList.add("hide");
    quizEl.classList.add("show");
    nextQuestion();
  }

  function endSession(showSummary){
    if(pendingTimer){ clearTimeout(pendingTimer); pendingTimer = null; }
    quizEl.classList.remove("show");
    setupEl.classList.remove("hide");
    if(showSummary){
      document.getElementById("rCorrect").textContent = correctCount;
      document.getElementById("rWrong").textContent = wrongCount;
      const total = correctCount + wrongCount;
      document.getElementById("rAcc").textContent = (total ? Math.round((correctCount/total)*100) : 0) + "%";
      resultEl.classList.add("show");
    }
  }

  /* ---------------- QUIZ LOGIC ---------------- */
  const glyphCard  = document.getElementById("glyphCard");
  const glyphText  = document.getElementById("glyphText");
  const iconGood   = document.getElementById("iconGood");
  const iconBad    = document.getElementById("iconBad");
  const answerRow  = document.getElementById("answerRow");
  const input      = document.getElementById("answer");
  const feedback   = document.getElementById("feedback");
  const submitBtn  = document.getElementById("submit");

  function nextQuestion(){
    if(pendingTimer){ clearTimeout(pendingTimer); pendingTimer = null; }
    if(queue.length === 0) queue = shuffle(pool);
    current = queue.pop();
    answered = false;
    qToken++;

    glyphCard.classList.remove("correct","wrong");
    glyphCard.classList.add("pulse");
    iconGood.classList.remove("show");
    iconBad.classList.remove("show");

    answerRow.classList.remove("correct","wrong");
    input.value = "";
    input.disabled = false;
    feedback.textContent = "";
    feedback.className = "feedback";
    submitBtn.textContent = "Verificar";

    const isCombo = current[0].length > 1;
    glyphText.classList.remove("in");
    glyphText.classList.toggle("combo", isCombo);
    glyphText.textContent = current[0];
    // force reflow so the fade-in transition retriggers
    void glyphText.offsetWidth;
    requestAnimationFrame(()=>glyphText.classList.add("in"));

    input.focus();
  }

  function checkAnswer(){
    if(answered){ nextQuestion(); return; }
    const raw = input.value.trim();
    if(!raw) return;

    const guess = normalize(raw);
    const accepted = current[1].map(normalize);
    const isCorrect = accepted.includes(guess);
    const myToken = qToken;

    answered = true;
    input.disabled = true;
    glyphCard.classList.remove("pulse");

    if(isCorrect){
      correctCount++; streak++;
      glyphCard.classList.add("correct");
      answerRow.classList.add("correct");
      iconGood.classList.add("show");
      feedback.className = "feedback correct";
      feedback.innerHTML = "certo — <b>"+current[1][0]+"</b>";
    } else {
      wrongCount++; streak = 0;
      glyphCard.classList.add("wrong");
      answerRow.classList.add("wrong");
      iconBad.classList.add("show");
      feedback.className = "feedback wrong";
      feedback.innerHTML = "era — <b>"+current[1].join(" / ")+"</b>";
    }

    updateStatBar();
    submitBtn.textContent = "Próximo →";

    pendingTimer = setTimeout(()=>{
      if(answered && qToken === myToken) nextQuestion();
    }, isCorrect ? 480 : 780);
  }

  function updateStatBar(){
    document.getElementById("statCorrect").textContent = correctCount;
    document.getElementById("statWrong").textContent = wrongCount;
    document.getElementById("statStreak").textContent = streak;
  }

  submitBtn.addEventListener("click", checkAnswer);
  input.addEventListener("keydown", (e)=>{ if(e.key === "Enter"){ e.preventDefault(); checkAnswer(); } });
  document.getElementById("skipBtn").addEventListener("click", ()=>{
    if(answered) return;
    if(pendingTimer){ clearTimeout(pendingTimer); pendingTimer = null; }
    nextQuestion();
  });

})();
</script>
</body>
</html>
